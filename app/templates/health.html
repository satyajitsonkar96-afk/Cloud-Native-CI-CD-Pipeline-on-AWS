<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health Check | Cloud DevOps App</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: linear-gradient(145deg, #f0f9ff 0%, #e6f0fa 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
        }
        .container {
            max-width: 600px;
            width: 100%;
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(10px);
            border-radius: 2rem;
            padding: 2rem;
            box-shadow: 0 25px 45px -12px rgba(0,0,0,0.2);
        }
        h1 { font-size: 2rem; margin-bottom: 0.5rem; color: #1e293b; }
        .sub { color: #475569; margin-bottom: 2rem; border-left: 3px solid #10b981; padding-left: 1rem; }
        .status-card { background: #f8fafc; border-radius: 1.5rem; padding: 1.5rem; margin-bottom: 1.5rem; }
        .badge {
            display: inline-flex; align-items: center; gap: 0.5rem;
            padding: 0.4rem 1rem; border-radius: 60px; font-weight: 600;
            margin-bottom: 1rem;
        }
        .healthy { background: #d1fae5; color: #065f46; }
        .unhealthy { background: #fee2e2; color: #991b1b; }
        .loading { background: #e2e3e5; color: #4b5563; }
        .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
        .dot-green { background: #10b981; }
        .dot-red { background: #ef4444; }
        .dot-gray { background: #6b7280; }
        .pulse { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 0.4; transform: scale(0.8); } 100% { opacity: 1; transform: scale(1.2); } }
        .info-row { display: flex; justify-content: space-between; padding: 0.7rem 0; border-bottom: 1px solid #e2e8f0; }
        .info-label { font-weight: 600; }
        .info-value { font-family: monospace; }
        .refresh-btn {
            background: #0f3b5c; color: white; border: none;
            padding: 0.7rem 1.5rem; border-radius: 40px; font-weight: 500;
            cursor: pointer; transition: 0.2s;
        }
        .refresh-btn:hover { background: #1e6f5c; transform: scale(0.97); }
        .footer { margin-top: 2rem; font-size: 0.75rem; color: #6c7a91; text-align: center; }
    </style>
</head>
<body>
<div class="container">
    <h1>🩺 Health Monitor</h1>
    <div class="sub">Live health status of your Cloud DevOps App</div>
    <div class="status-card">
        <div class="badge loading" id="badge"><span class="dot dot-gray pulse"></span> Checking...</div>
        <div id="details">
            <div class="info-row"><span class="info-label">Application</span><span id="appName">—</span></div>
            <div class="info-row"><span class="info-label">Version</span><span id="appVersion">—</span></div>
            <div class="info-row"><span class="info-label">Server Time</span><span id="serverTime">—</span></div>
            <div class="info-row"><span class="info-label">HTTP Status</span><span id="httpStatus">—</span></div>
        </div>
    </div>
    <button class="refresh-btn" onclick="checkHealth()">🔄 Refresh</button>
    <div class="footer">Auto-refresh every 15s | <code>/health</code> endpoint</div>
</div>
<script>
    async function checkHealth() {
        const badge = document.getElementById('badge');
        const appSpan = document.getElementById('appName');
        const verSpan = document.getElementById('appVersion');
        const timeSpan = document.getElementById('serverTime');
        const httpSpan = document.getElementById('httpStatus');
        badge.className = 'badge loading';
        badge.innerHTML = '<span class="dot dot-gray pulse"></span> Checking...';
        try {
            const res = await fetch('/health', { cache: 'no-store' });
            httpSpan.innerText = `${res.status} ${res.statusText}`;
            if (res.ok) {
                const data = await res.json();
                badge.className = 'badge healthy';
                badge.innerHTML = '<span class="dot dot-green"></span> ● HEALTHY';
                appSpan.innerText = data.application || 'Cloud DevOps App';
                verSpan.innerText = data.version || '1.0';
                timeSpan.innerText = data.time || new Date().toISOString();
            } else {
                badge.className = 'badge unhealthy';
                badge.innerHTML = '<span class="dot dot-red"></span> ● UNHEALTHY';
                appSpan.innerText = 'Error';
                verSpan.innerText = '-';
                timeSpan.innerText = '-';
            }
        } catch (err) {
            badge.className = 'badge unhealthy';
            badge.innerHTML = '<span class="dot dot-red"></span> ● OFFLINE';
            appSpan.innerText = 'Cannot reach backend';
            verSpan.innerText = '-';
            timeSpan.innerText = '-';
            httpSpan.innerText = 'Network Error';
        }
    }
    checkHealth();
    setInterval(checkHealth, 15000);
</script>
</body>
</html>
